# Copy to fdroiddata/metadata/com.tunefriend.app.yml when submitting.
# Repo: https://gitlab.com/fdroid/fdroiddata

Categories:
  - Multimedia
License: GPL-3.0-or-later
AuthorName: James
SourceCode: https://github.com/tunefriend/tunefriend
IssueTracker: https://github.com/tunefriend/tunefriend/issues
WebSite: https://github.com/tunefriend/tunefriend

AutoName: TuneFriend

RepoType: git
Repo: https://github.com/tunefriend/tunefriend.git

Builds:
  - versionName: '2.0'
    versionCode: 10
    commit: v2.0
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y npm
    gradle:
      - yes
    prebuild:
      - cd ../..
      - npm ci
      - find node_modules/ -iname "*.node" -exec rm {} \;
    scanignore:
      - node_modules/@capacitor/cli/assets/capacitor-cordova-android-plugins.tar.gz
    scandelete:
      - node_modules/
      - www/
    build:
      - pushd ../..
      - npm run sync:www
      - npx cap sync android
      - popd

AutoUpdateMode: Version
UpdateCheckMode: Tags ^v[0-9.]+$
UpdateCheckData: android/app/build.gradle|versionCode\s(\d+)|.|versionName\s\"([^\"]+)\"
CurrentVersion: '2.0'
CurrentVersionCode: 10