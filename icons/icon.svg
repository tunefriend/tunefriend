<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="55%" stop-color="#b44dff"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#ff6b9d" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="#0a0a0f"/>
  <rect x="24" y="24" width="464" height="464" rx="96" fill="none" stroke="url(#brand)" stroke-width="4" opacity="0.35"/>
  <circle cx="256" cy="250" r="168" fill="url(#glow)"/>

  <!-- Handshake behind headphones -->
  <g opacity="0.72" fill="url(#brand)">
    <path d="M118 318c18-36 44-54 78-58 10-1 18 6 16 16-2 14-18 28-34 36-20 10-42 12-60 6z"/>
    <path d="M394 318c-18-36-44-54-78-58-10-1-18 6-16 16 2 14 18 28 34 36 20 10 42 12 60 6z"/>
    <path d="M196 332c28-8 44-8 72 0 20 6 34 18 40 34 4 10-2 18-12 16-24-4-44-18-68-18s-44 14-68 18c-10 2-16-6-12-16 6-16 20-28 40-34z"/>
    <rect x="238" y="300" width="36" height="52" rx="10" opacity="0.85"/>
  </g>

  <g transform="translate(0 34)">
    <!-- Headphone band -->
    <path d="M148 248c0-72 48-122 108-122s108 50 108 122" fill="none" stroke="url(#brand)" stroke-width="34" stroke-linecap="round"/>

    <!-- Left cup -->
    <rect x="118" y="246" width="78" height="118" rx="36" fill="url(#brand)"/>
    <rect x="132" y="262" width="50" height="86" rx="22" fill="#0a0a0f" opacity="0.35"/>

    <!-- Right cup -->
    <rect x="316" y="246" width="78" height="118" rx="36" fill="url(#brand)"/>
    <rect x="330" y="262" width="50" height="86" rx="22" fill="#0a0a0f" opacity="0.35"/>

    <!-- Sound waves -->
    <path d="M256 316c-18 0-32 14-32 32" fill="none" stroke="#f0f0f5" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M256 300c-34 0-60 26-60 60" fill="none" stroke="#7c5cff" stroke-width="8" stroke-linecap="round" opacity="0.75"/>
    <path d="M256 284c-50 0-90 40-90 90" fill="none" stroke="#ff6b9d" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
  </g>
</svg>